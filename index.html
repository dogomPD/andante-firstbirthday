<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>안단테 돌잔치 초대장</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    :root {
      --page-height: 100vh;
    }

    html {
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: 'Gowun Dodum', sans-serif;
      color: #4b352e;
      text-align: center;
      overflow-x: hidden;
      background: #fff8f1;
    }

    .section {
      width: 100%;
      height: var(--page-height);
      scroll-snap-align: start;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
      overflow: hidden;
    }

    .invite-bg {
      width: 100%;
      max-width: 520px;
      height: calc(var(--page-height) - 36px);
      background-image: url("bg.png");
      background-size: 100% 100%;
      background-position: center;
      background-repeat: no-repeat;
      border-radius: 20px;
      box-shadow: 0 12px 36px rgba(120, 80, 40, 0.14);
      position: relative;
      overflow: hidden;
      padding: 70px 32px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .content {
      position: relative;
      z-index: 2;
    }

    .crown {
      font-size: 34px;
      margin-bottom: 10px;
    }

    .small-title {
      font-size: 18px;
      color: #a8743f;
      margin-bottom: 12px;
    }

    h1 {
      font-family: 'Gowun Batang', serif;
      font-size: clamp(46px, 13vw, 66px);
      margin: 8px 0 18px;
      letter-spacing: 5px;
    }

    h2 {
      font-family: 'Gowun Batang', serif;
      font-size: 32px;
      margin-bottom: 18px;
    }

    .message {
      font-family: 'Gowun Batang', serif;
      font-size: 17px;
      line-height: 1.9;
    }

    .card {
      background: rgba(255,255,255,0.86);
      border: 1px solid #f0ddd0;
      border-radius: 22px;
      padding: 22px 18px;
      box-shadow: 0 10px 26px rgba(130, 90, 60, 0.10);
    }

    .info-row {
      display: flex;
      gap: 12px;
      padding: 12px 0;
      border-top: 1px dashed #ead8cb;
      text-align: left;
      line-height: 1.6;
      font-size: 15px;
    }

    .icon {
      width: 28px;
      flex-shrink: 0;
      text-align: center;
    }

    button {
      padding: 11px 18px;
      border-radius: 999px;
      border: none;
      background: #ffc5ce;
      cursor: pointer;
      margin-top: 10px;
      font-family: 'Gowun Dodum', sans-serif;
    }

    .hint {
      position: absolute;
      bottom: 25px;
      left: 0;
      right: 0;
      font-size: 14px;
      color: #9c7a67;
      animation: bounce 1.5s infinite;
      cursor: pointer;
      z-index: 5;
      user-select: none;
    }

    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(6px); }
    }

    @media (max-width:480px) {
      .section {
        padding: 0;
      }

      .invite-bg {
        max-width: none;
        width: 100%;
        height: var(--page-height);
        border-radius: 0;
        box-shadow: none;
        padding: 60px 24px 72px;
      }
    }
  </style>
</head>

<body>

<section class="section" id="section1">
  <div class="invite-bg">
    <div class="content">
      <div class="crown">👑</div>
      <div class="small-title">안단테의 첫 번째 생일</div>
      <h1>초대합니다</h1>
      <p class="message">
        안단테가 태어나 처음 맞이하는 생일,<br>
        소중한 분들과 함께<br>
        따뜻하게 축하하고 싶습니다.<br>
        귀한 발걸음으로 자리를 빛내주세요.
      </p>
    </div>
    <div class="hint" onclick="goToSection(2)">아래 더 보기! 👇</div>
  </div>
</section>

<section class="section" id="section2">
  <div class="invite-bg">
    <div class="content">
      <h2>우리 아기의 순간</h2>
      <div class="card">
        아기 사진이 들어갈 자리
      </div>
    </div>
    <div class="hint" onclick="goToSection(3)">아래 더 보기! 👇</div>
  </div>
</section>

<section class="section" id="section3">
  <div class="invite-bg">
    <div class="content">
      <div class="card">
        <h2>📍 오시는 길</h2>

        <div class="info-row"><div class="icon">📅</div><div>2026년 5월 3일 (일)</div></div>
        <div class="info-row"><div class="icon">⏰</div><div>오전 11시</div></div>
        <div class="info-row"><div class="icon">📍</div><div>경기 화성시 효행구 봉담읍 동화리 555-2<br>카페 플라</div></div>
      </div>
    </div>
    <div class="hint" onclick="goToSection(4)">아래 더 보기! 👇</div>
  </div>
</section>

<section class="section" id="section4">
  <div class="invite-bg">
    <div class="content">
      <div class="card">
        <h2>💌 마음 전하기</h2>
        <p>
          카카오뱅크 <strong>3333-07-1591722</strong><br>
          안규현
        </p>
        <button onclick="copyAccount()">📋 계좌 복사</button>
      </div>

      <p class="message" style="margin-top:24px;">
        안단테의 첫 생일을<br>
        함께 축하해주셔서 감사합니다 🤍
      </p>
    </div>
  </div>
</section>

<script>
  function setPageHeight() {
    const height = window.innerHeight;
    document.documentElement.style.setProperty('--page-height', height + 'px');
  }

  setPageHeight();

  window.addEventListener('orientationchange', function () {
    setTimeout(setPageHeight, 300);
  });

  function goToSection(num){
    document.getElementById("section" + num).scrollIntoView({ behavior: "smooth" });
  }

  function copyAccount(){
    navigator.clipboard.writeText("카카오뱅크 3333-07-1591722");
    alert("계좌번호가 복사되었습니다!");
  }
</script>

</body>
</html>
