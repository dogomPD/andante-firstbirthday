<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>안단테 돌잔치 초대장</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; }

:root { --page-height: 100vh; }

html, body {
  margin: 0;
  width: 100%;
  height: var(--page-height);
  overflow: hidden;
  font-family: 'Gowun Dodum', sans-serif;
  background: #fff8f1;
  color: #4b352e;
  text-align: center;
}

/* 🌸 파티클 */
.floating {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 20;
}
.floating span {
  position: absolute;
  top: -10%;
  opacity: 0.3;
  animation: fall linear infinite;
}
@keyframes fall {
  to { transform: translateY(110vh) rotate(360deg); }
}

/* 메인 */
.app {
  width: 100%;
  height: var(--page-height);
  display: flex;
  justify-content: center;
  align-items: center;
}

.invite-bg {
  width: 100%;
  max-width: 520px;
  height: calc(var(--page-height) - 20px);
  background: url("bg.png") center/contain no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}

/* 페이지 */
.stage {
  width: 78%;
  position: relative;
}

.page {
  position: absolute;
  width: 100%;
  opacity: 0;
  filter: blur(2px);
  pointer-events: none;
  transition: opacity 0.4s ease, filter 0.4s ease;
}

.page.active {
  opacity: 1;
  filter: blur(0);
  pointer-events: auto;
}

/* 텍스트 */
.crown { font-size: 34px; }
.small-title { color: #a8743f; }
h1 {
  font-family: 'Gowun Batang';
  font-size: 50px;
}
h2 {
  font-family: 'Gowun Batang';
}
.message {
  line-height: 1.9;
}

.card {
  background: rgba(255,255,255,0.85);
  padding: 20px;
  border-radius: 20px;
  margin-top: 15px;
}

.info-row {
  padding: 8px 0;
  border-top: 1px dashed #ddd;
}

/* 버튼 */
.next-btn {
  position: absolute;
  bottom: 55px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 18px;
  border-radius: 999px;
  background: rgba(255,255,255,0.75);
  cursor: pointer;
  animation: bounce 1.5s infinite;
}

@keyframes bounce {
  50% { transform: translateX(-50%) translateY(6px); }
}

/* 인디케이터 */
.indicator {
  position: fixed;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
}

.dot {
  width: 6px;
  height: 6px;
  background: #ccc;
  border-radius: 50%;
  margin: 6px 0;
}
.dot.active {
  background: #9c7a67;
}
</style>
</head>

<body>

<!-- 🌸 효과 -->
<div class="floating">
  <span style="left:10%; animation-duration:8s;">🌸</span>
  <span style="left:30%; animation-duration:9s;">✨</span>
  <span style="left:60%; animation-duration:7s;">🎀</span>
  <span style="left:80%; animation-duration:10s;">🌸</span>
</div>

<!-- 인디케이터 -->
<div class="indicator">
  <div class="dot active"></div>
  <div class="dot"></div>
  <div class="dot"></div>
  <div class="dot"></div>
</div>

<main class="app">
  <div class="invite-bg">

    <div class="stage">

      <!-- 1 -->
      <div class="page active">
        <div class="crown">👑</div>
        <div class="small-title">안단테의 첫 번째 생일</div>
        <h1>초대합니다</h1>

        <p class="message">
          안단테가 태어나 처음 맞이하는 생일,<br>
          함께 축하해주세요
        </p>
      </div>

      <!-- 2 -->
      <div class="page">
        <h2>우리 아기의 순간</h2>
        <div class="card">사진 영역</div>
      </div>

      <!-- 3 -->
      <div class="page">
        <div class="card">
          <h2>📍 오시는 길</h2>
          <div class="info-row">📅 2026.05.03</div>
          <div class="info-row">⏰ 오전 11시</div>
          <div class="info-row">📍 카페 플라</div>
        </div>
      </div>

      <!-- 4 -->
      <div class="page">
        <div class="card">
          <h2>💌 마음 전하기</h2>
          <p>카카오뱅크 3333-07-1591722</p>
          <button onclick="copyAccount()">복사</button>
        </div>
      </div>

    </div>

    <div class="next-btn" onclick="nextPage()">다음 페이지</div>

  </div>
</main>

<script>
let current = 0;
const pages = document.querySelectorAll('.page');
const dots = document.querySelectorAll('.dot');

function showPage(i){
  pages[current].classList.remove('active');
  pages[i].classList.add('active');

  dots[current].classList.remove('active');
  dots[i].classList.add('active');

  current = i;
}

function nextPage(){
  if(current < pages.length - 1){
    showPage(current + 1);
  }
}

function copyAccount(){
  navigator.clipboard.writeText("카카오뱅크 3333-07-1591722");
  alert("복사됨");
}

/* 스크롤도 지원 */
window.addEventListener('wheel', e=>{
  if(e.deltaY > 0) nextPage();
});
</script>

</body>
</html>
