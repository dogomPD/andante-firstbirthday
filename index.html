<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>안단테 돌잔치</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 폰트 -->
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Gowun Dodum', sans-serif;
      background: #ffffff;
      text-align: center;
      overflow-x: hidden;
    }

    section {
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      transition: all 0.8s ease;
    }

    img {
      max-width: 80%;
      border-radius: 20px;
    }

    iframe {
      width: 90%;
      height: 300px;
      border-radius: 20px;
    }

    .fade {
      opacity: 0;
      transform: translateX(50px);
    }

    .fade.active {
      opacity: 1;
      transform: translateX(0);
    }
  </style>
</head>

<body>

  <!-- 1. 사진 -->
  <section class="fade">
    <h1>안단테 돌잔치</h1>
    <p>우리 아기의 첫 번째 생일</p>
    <img src="https://via.placeholder.com/400x300" />
  </section>

  <!-- 2. 영상 -->
  <section class="fade">
    <h2>영상 보기</h2>
    <iframe src="https://www.youtube.com/embed/영상ID"></iframe>
  </section>

  <!-- 3. 생일 -->
  <section class="fade">
    <h2>🎂 2025.05.08</h2>
    <p>안단테가 태어난 소중한 날!</p>
  </section>

  <!-- 4. 장소 & 계좌 -->
  <section class="fade">
    <div style="background:#fff7f9; padding:25px; border-radius:25px; width:80%; box-shadow:0 10px 25px rgba(0,0,0,0.08);">

      <h2>📍 오시는 길</h2>
      <h3>안단테 첫 생일 잔치</h3>

      <p>📅 2026년 5월 3일 (일)</p>
      <p>⏰ 오전 11시</p>
      <p>📍 경기 화성시 효행구 봉담읍 동화리 555-2 카페 플라</p>

      <hr style="margin:20px 0; border:none; border-top:1px solid #eee;">

      <div style="margin-top:10px;">
        <p id="account">카카오뱅크 3333-07-1591722 안규현</p>

        <button onclick="copyAccount()" 
          style="padding:8px 14px; border:none; border-radius:10px; background:#ffd6e0; cursor:pointer;">
          📋 계좌 복사
        </button>
      </div>

    </div>
  </section>

<script>
  const sections = document.querySelectorAll('.fade');

  window.addEventListener('scroll', () => {
    const triggerBottom = window.innerHeight * 0.8;

    sections.forEach(section => {
      const boxTop = section.getBoundingClientRect().top;

      if (boxTop < triggerBottom) {
        section.classList.add('active');
      }
    });
  });

  // ⭐ 복사 기능
  function copyAccount() {
    const text = document.getElementById("account").innerText;
    navigator.clipboard.writeText(text);
    alert("계좌번호가 복사되었습니다!");
  }
</script>

</body>
</html>
