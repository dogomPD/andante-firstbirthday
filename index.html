<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>안단테 돌잔치 초대장</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Gowun Dodum', sans-serif;
      background: linear-gradient(180deg, #fff8f3 0%, #fffdf9 100%);
      color: #4b3b34;
      text-align: center;
      overflow-x: hidden;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      padding: 28px 16px;
      display: flex;
      justify-content: center;
    }

    .invitation {
      width: 100%;
      max-width: 520px;
      background: #fffdf9;
      border: 1.5px solid #e6cda8;
      border-radius: 28px;
      padding: 28px 20px 32px;
      box-shadow: 0 18px 40px rgba(120, 80, 40, 0.12);
      position: relative;
      overflow: hidden;
    }

    .invitation::before,
    .invitation::after {
      content: "🌸";
      position: absolute;
      font-size: 54px;
      opacity: 0.35;
    }

    .invitation::before {
      top: 12px;
      left: 14px;
    }

    .invitation::after {
      bottom: 12px;
      right: 14px;
      transform: rotate(180deg);
    }

    .crown {
      font-size: 32px;
      margin-top: 8px;
    }

    .small-title {
      margin-top: 10px;
      color: #a77a43;
      font-size: 15px;
      letter-spacing: 1px;
    }

    h1 {
      font-family: 'Gowun Batang', serif;
      font-size: clamp(42px, 12vw, 64px);
      margin: 12px 0 10px;
      font-weight: 700;
      color: #4a332b;
      letter-spacing: 4px;
    }

    .subtitle {
      font-size: 16px;
      line-height: 1.8;
      margin: 18px auto 26px;
      max-width: 330px;
    }

    .divider {
      width: 70%;
      max-width: 260px;
      margin: 18px auto;
      border: 0;
      border-top: 1px solid #e7d6c2;
    }

    .photo-box {
      width: 100%;
      aspect-ratio: 4 / 3;
      border-radius: 24px;
      background: #f5eee7;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #b59b85;
      margin: 18px 0 28px;
      overflow: hidden;
    }

    .photo-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card {
      background: #ffffff;
      border: 1px solid #f0ded0;
      border-radius: 24px;
      padding: 22px 18px;
      margin: 18px 0;
      box-shadow: 0 10px 26px rgba(130, 90, 60, 0.08);
    }

    .card h2 {
      font-family: 'Gowun Batang', serif;
      font-size: 28px;
      margin: 0 0 16px;
      color: #5a4035;
    }

    .info-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      text-align: left;
      padding: 13px 4px;
      border-bottom: 1px dashed #ead9cc;
      font-size: 15.5px;
      line-height: 1.6;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .icon {
      width: 28px;
      flex-shrink: 0;
      text-align: center;
      font-size: 20px;
    }

    .account-text {
      line-height: 1.8;
      font-size: 15.5px;
    }

    button {
      margin-top: 12px;
      padding: 11px 18px;
      border: none;
      border-radius: 999px;
      background: #ffd4dc;
      color: #4b3b34;
      font-family: 'Gowun Dodum', sans-serif;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(220, 120, 140, 0.18);
    }

    .thanks {
      margin-top: 24px;
      line-height: 1.8;
      font-family: 'Gowun Batang', serif;
      font-size: 17px;
    }

    .fade {
      opacity: 0;
      transform: translateY(24px);
      transition: all 0.9s ease;
    }

    .fade.active {
      opacity: 1;
      transform: translateY(0);
    }

    @media (min-width: 768px) {
      .page {
        padding: 50px 20px;
      }

      .invitation {
        max-width: 620px;
        padding: 42px 46px;
      }

      .subtitle {
        font-size: 18px;
      }

      .info-row {
        font-size: 17px;
      }
    }
  </style>
</head>

<body>

  <main class="page">
    <div class="invitation fade">

      <div class="crown">👑</div>
      <div class="small-title">안단테의 첫 번째 생일</div>

      <h1>초대합니다</h1>

      <p class="subtitle">
        안단테가 태어나 처음 맞이하는 생일,<br>
        소중한 분들과 함께 따뜻하게 축하하고 싶습니다.
      </p>

      <hr class="divider">

      <div class="photo-box">
        <span>아기 사진이 들어갈 자리</span>
        <!-- 나중에 사진 넣을 때 아래처럼 변경 -->
        <!-- <img src="photo1.jpg" alt="안단테 사진"> -->
      </div>

      <section class="card">
        <h2>📍 오시는 길</h2>

        <div class="info-row">
          <div class="icon">📅</div>
          <div>2026년 5월 3일 (일)</div>
        </div>

        <div class="info-row">
          <div class="icon">⏰</div>
          <div>오전 11시</div>
        </div>

        <div class="info-row">
          <div class="icon">📍</div>
          <div>경기 화성시 효행구 봉담읍 동화리 555-2<br>카페 플라</div>
        </div>
      </section>

      <section class="card">
        <h2>💌 마음 전하기</h2>

        <p class="account-text">
          카카오뱅크<br>
          <strong>3333-07-1591722</strong><br>
          안규현
        </p>

        <button onclick="copyAccount()">📋 계좌 복사</button>
      </section>

      <p class="thanks">
        안단테의 첫 생일을<br>
        함께 축하해주셔서 감사합니다 🤍
      </p>

    </div>
  </main>

<script>
  const fadeItems = document.querySelectorAll('.fade');

  window.addEventListener('load', () => {
    fadeItems.forEach(item => item.classList.add('active'));
  });

  function copyAccount() {
    const text = "카카오뱅크 3333-07-1591722";
    navigator.clipboard.writeText(text);
    alert("계좌번호가 복사되었습니다!");
  }
</script>

</body>
</html>
