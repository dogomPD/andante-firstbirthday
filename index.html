<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>안단테 돌잔치</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: #ffffff;
      text-align: center;
      overflow-x: hidden;
    }

    section {
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      transition: all 0.8s ease;
    }

    .slide {
      font-size: 28px;
      color: #333;
    }

    img {
      max-width: 80%;
      border-radius: 20px;
    }

    iframe {
      width: 90%;
      height: 300px;
      border-radius: 20px;
    }

    .fade {
      opacity: 0;
      transform: translateX(50px);
    }

    .fade.active {
      opacity: 1;
      transform: translateX(0);
    }
  </style>
</head>

<body>

  <!-- 1. 사진 슬라이드 -->
  <section class="fade">
    <h1>안단테 돌잔치</h1>
    <p>우리 아기의 첫 번째 생일</p>
    <img src="https://via.placeholder.com/400x300" />
  </section>

  <!-- 2. 영상 -->
  <section class="fade">
    <h2>영상 보기</h2>
    <iframe src="https://www.youtube.com/embed/영상ID"></iframe>
  </section>

  <!-- 3. 생일 -->
  <section class="fade">
    <h2>🎂 2026.XX.XX</h2>
    <p>돌잔치를 축하해주세요!</p>
  </section>

  <!-- 4. 장소 & 계좌 -->
  <section class="fade">
    <h2>📍 장소</h2>
    <p>장소 입력</p>

    <h2>💌 마음 전하기</h2>
    <p>계좌번호 입력</p>
  </section>

<script>
  const sections = document.querySelectorAll('.fade');

  window.addEventListener('scroll', () => {
    const triggerBottom = window.innerHeight * 0.8;

    sections.forEach(section => {
      const boxTop = section.getBoundingClientRect().top;

      if (boxTop < triggerBottom) {
        section.classList.add('active');
      }
    });
  });
</script>

</body>
</html>
