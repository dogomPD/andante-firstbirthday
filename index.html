<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>안단테 돌잔치 초대장</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    html {
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
      height: 100%;
    }

    body {
      margin: 0;
      font-family: 'Gowun Dodum', sans-serif;
      background: #fff8f1;
      color: #4b352e;
      text-align: center;
      overflow-x: hidden;
    }

    .section {
      width: 100%;
      height: 100vh;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 10px;
    }

    .invite-bg {
      width: 100%;
      max-width: 520px;
      height: 100%;

      background-image: url("bg.png");
      background-size: contain; /* ⭐ 핵심: 비율 유지 */
      background-position: center;
      background-repeat: no-repeat;
      background-color: #fff8f1;

      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .content {
      width: 85%;
    }

    h1 {
      font-family: 'Gowun Batang', serif;
      font-size: 48px;
      margin-bottom: 10px;
    }

    h2 {
      font-family: 'Gowun Batang', serif;
      font-size: 28px;
    }

    .message {
      font-size: 16px;
      line-height: 1.8;
    }

    .card {
      background: rgba(255,255,255,0.85);
      padding: 20px;
      border-radius: 20px;
      margin-top: 15px;
    }

    .info-row {
      padding: 8px 0;
      border-top: 1px dashed #ddd;
      font-size: 15px;
    }

    button {
      margin-top: 10px;
      padding: 10px 18px;
      border-radius: 999px;
      border: none;
      background: #ffc5ce;
      cursor: pointer;
    }

    .hint {
      position: absolute;
      bottom: 25px;
      width: 100%;
      font-size: 14px;
      animation: bounce 1.5s infinite;
      cursor: pointer;
    }

    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(6px); }
    }

  </style>
</head>

<body>

<section class="section" id="section1">
  <div class="invite-bg">
    <div class="content">
      <h1>초대합니다</h1>
      <p class="message">
        안단테의 첫 생일에<br>
        여러분을 초대합니다
      </p>
    </div>
    <div class="hint" onclick="goToSection(2)">아래 더 보기! 👇</div>
  </div>
</section>

<section class="section" id="section2">
  <div class="invite-bg">
    <div class="content">
      <h2>우리 아기의 순간</h2>
      <div class="card">사진 들어갈 자리</div>
    </div>
    <div class="hint" onclick="goToSection(3)">아래 더 보기! 👇</div>
  </div>
</section>

<section class="section" id="section3">
  <div class="invite-bg">
    <div class="content">
      <div class="card">
        <h2>📍 오시는 길</h2>
        <div class="info-row">📅 2026년 5월 3일</div>
        <div class="info-row">⏰ 오전 11시</div>
        <div class="info-row">📍 카페 플라</div>
      </div>
    </div>
    <div class="hint" onclick="goToSection(4)">아래 더 보기! 👇</div>
  </div>
</section>

<section class="section" id="section4">
  <div class="invite-bg">
    <div class="content">
      <div class="card">
        <h2>💌 마음 전하기</h2>
        <p>카카오뱅크 3333-07-1591722</p>
        <button onclick="copyAccount()">계좌 복사</button>
      </div>
    </div>
  </div>
</section>

<script>
function goToSection(num){
  document.getElementById("section"+num).scrollIntoView({behavior:"smooth"});
}

function copyAccount(){
  navigator.clipboard.writeText("카카오뱅크 3333-07-1591722");
  alert("복사되었습니다!");
}
</script>

</body>
</html>
