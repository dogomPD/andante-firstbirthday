<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>안단테 돌잔치 초대장</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    html {
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: 'Gowun Dodum', sans-serif;
      color: #4b352e;
      text-align: center;
      overflow-x: hidden;
      background: #fff8f1;
    }

    .section {
      width: 100%;
      height: 100svh;
      min-height: 100svh;
      scroll-snap-align: start;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
      overflow: hidden;
    }

    .invite-bg {
      width: 100%;
      max-width: 520px;
      height: calc(100svh - 36px);
      min-height: calc(100svh - 36px);

      background-image: url("bg.png");
      background-size: 100% 100%;
      background-position: center;
      background-repeat: no-repeat;

      border-radius: 20px;
      box-shadow: 0 12px 36px rgba(120, 80, 40, 0.14);
      position: relative;
      overflow: hidden;
      padding: 70px 32px 70px;

      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .content {
      position: relative;
      z-index: 2;
    }

    .crown { font-size: 34px; margin-bottom: 10px; }

    .small-title {
      font-size: 18px;
      color: #a8743f;
      margin-bottom: 12px;
    }

    h1 {
      font-family: 'Gowun Batang', serif;
      font-size: clamp(46px, 13vw, 66px);
      margin: 8px 0 18px;
      letter-spacing: 5px;
    }

    h2 {
      font-family: 'Gowun Batang', serif;
      font-size: 32px;
      margin-bottom: 18px;
    }

    .message {
      font-family: 'Gowun Batang', serif;
      font-size: 17px;
      line-height: 1.9;
    }

    .card {
      background: rgba(255,255,255,0.85);
      border-radius: 20px;
      padding: 20px;
    }

    .info-row {
      display: flex;
      gap: 10px;
      padding: 10px 0;
      border-top: 1px dashed #ddd;
      text-align: left;
    }

    .icon { width: 25px; }

    button {
      padding: 10px 18px;
      border-radius: 999px;
      border: none;
      background: #ffc5ce;
      cursor: pointer;
      margin-top: 10px;
    }

    .hint {
      position: absolute;
      bottom: 25px;
      left: 0;
      right: 0;
      font-size: 14px;
      color: #9c7a67;
      animation: bounce 1.5s infinite;
      cursor: pointer;
    }

    @keyframes bounce {
      0%,100% { transform: translateY(0);}
      50% { transform: translateY(6px);}
    }

    @media (max-width:480px) {
      .section { padding:0; }

      .invite-bg {
        max-width:none;
        height:100svh;
        border-radius:0;
        padding:60px 20px;
      }
    }
  </style>
</head>

<body>

<section class="section" id="section1">
  <div class="invite-bg">
    <div class="content">
      <div class="crown">👑</div>
      <div class="small-title">안단테의 첫 번째 생일</div>
      <h1>초대합니다</h1>

      <p class="message">
        안단테의 첫 생일에<br>
        여러분을 초대합니다.
      </p>
    </div>
    <div class="hint" onclick="goToSection(2)">아래 더 보기! 👇</div>
  </div>
</section>

<section class="section" id="section2">
  <div class="invite-bg">
    <div class="content">
      <h2>우리 아기의 순간</h2>
      <div class="card">
        사진 넣는 영역
      </div>
    </div>
    <div class="hint" onclick="goToSection(3)">아래 더 보기! 👇</div>
  </div>
</section>

<section class="section" id="section3">
  <div class="invite-bg">
    <div class="content">
      <div class="card">
        <h2>📍 오시는 길</h2>

        <div class="info-row"><div class="icon">📅</div>2026년 5월 3일</div>
        <div class="info-row"><div class="icon">⏰</div>오전 11시</div>
        <div class="info-row"><div class="icon">📍</div>카페 플라</div>
      </div>
    </div>
    <div class="hint" onclick="goToSection(4)">아래 더 보기! 👇</div>
  </div>
</section>

<section class="section" id="section4">
  <div class="invite-bg">
    <div class="content">
      <div class="card">
        <h2>💌 마음 전하기</h2>
        <p>카카오뱅크 3333-07-1591722</p>
        <button onclick="copyAccount()">계좌 복사</button>
      </div>
    </div>
  </div>
</section>

<script>
function goToSection(num){
  document.getElementById("section"+num).scrollIntoView({behavior:"smooth"});
}

function copyAccount(){
  navigator.clipboard.writeText("카카오뱅크 3333-07-1591722");
  alert("복사되었습니다!");
}
</script>

</body>
</html>
